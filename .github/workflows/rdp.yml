# Auto-generated — AI STV (encrypted)
name: AI STV Windows VM
on:
  workflow_dispatch:
jobs:
  aistv-vm:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        instance_id: [1]
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Kết nối Tailscale và gắn Tag bảo mật
        shell: pwsh
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $tsExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path -LiteralPath $tsExe)) {
            Write-Host "Tailscale: downloading installer..."
            $exe = Join-Path $env:RUNNER_TEMP "tailscale-setup.exe"
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-full-1.98.4.exe" -OutFile $exe -UseBasicParsing -TimeoutSec 120
            Write-Host "Tailscale: running installer (timeout 120s)..."
            $p = Start-Process -FilePath $exe -ArgumentList @("/quiet") -PassThru -NoNewWindow
            $done = $p.WaitForExit(120000)
            if (-not $done) { $p.Kill(); Write-Host "Tailscale installer timed out, continuing..." }
            else { Write-Host "Tailscale installer exit $($p.ExitCode)" }
            Start-Sleep -Seconds 5
          }
          if (-not (Test-Path -LiteralPath $tsExe)) {
            Write-Host "Tailscale: not installed, trying winget fallback..."
            if (Get-Command winget -ErrorAction SilentlyContinue) {
              $wp = Start-Process -FilePath "winget.exe" -ArgumentList @("install","--id","Tailscale.Tailscale","-e","--disable-interactivity","--accept-source-agreements","--accept-package-agreements") -PassThru -NoNewWindow
              $wdone = $wp.WaitForExit(120000)
              if (-not $wdone) { $wp.Kill() }
              Start-Sleep -Seconds 5
            } else { Write-Host "Tailscale: winget not available either" }
          }
          if (Test-Path -LiteralPath $tsExe) {
            $tsRunId = if ($env:GITHUB_RUN_ID) { $env:GITHUB_RUN_ID } else { '0' }
            Write-Host "Tailscale: authenticating..."
            & $tsExe up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=STV-VM-$tsRunId --advertise-tags=tag:vps --accept-routes --accept-dns=false --timeout=90s 2>&1
          } else {
            Write-Host "Tailscale: SKIP — not installed, VM will use public IP"
          }
          Remove-Item Env:TAILSCALE_AUTH_KEY -Force -ErrorAction SilentlyContinue
      - name: AI STV Provision
        timeout-minutes: 25
        shell: pwsh
        env:
          INSTANCE_ID: ${{ matrix.instance_id }}
          MACHINE_COUNT: '1'
          VM_DURATION_MINUTES: '15'
        run: |
          try {
            $b64 = "${{ secrets.VM_PROVISION_SCRIPT }}"
            $script = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($b64))
            Invoke-Expression $script
          } catch {
            Write-Error "Provision failed: $($_.Exception.Message)"
            exit 1
          }
      - name: Upload VM credentials
        uses: actions/upload-artifact@v4
        with:
          name: aistv-creds-${{ matrix.instance_id }}
          path: vm-creds.json
          if-no-files-found: warn
          retention-days: 1
      - name: AI STV Keep-Alive
        shell: pwsh
        env:
          INSTANCE_ID: ${{ matrix.instance_id }}
          MACHINE_COUNT: '1'
          VM_DURATION_MINUTES: '15'
        run: |
          try {
            $b64 = "${{ secrets.VM_KEEPALIVE_SCRIPT }}"
            $script = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($b64))
            Invoke-Expression $script
          } catch {
            Write-Error "Keep-alive failed: $($_.Exception.Message)"
            exit 1
          }
